<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مشروع الذكاء الاصطناعي</title>
    <!-- Google Fonts for Arabic UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">تسجيل الدخول</h1>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">اسم المستخدم</label>
                    <input type="text" id="username" class="form-control" autocomplete="off" placeholder="أدخل اسم المستخدم">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">كلمة المرور</label>
                    <input type="password" id="password" class="form-control" placeholder="أدخل كلمة المرور">
                </div>
                
                <div id="errorMessage" class="error-message">
                    اسم المستخدم أو كلمة المرور غير صحيحة. الرجاء المحاولة مرة أخرى.
                </div>
                
                <button type="submit" class="btn-primary" style="margin-top: 1.5rem;">دخول</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
